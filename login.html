<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>AVSEC PRO — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#020B14;--panel:#0A2035;--cyan:#00E5FF;--cyan2:#00B8D4;
  --neon:#39FF14;--amber:#FFB300;--red:#FF1744;--violet:#E040FB;
  --t1:#E0F7FA;--t2:#80DEEA;--t3:#4DD0E1;--dim:#37474F;
  --mono:'Share Tech Mono',monospace;--head:'Orbitron',sans-serif;--body:'Exo 2',sans-serif;
  --glow-cyan:0 0 14px #00E5FF50,0 0 40px #00E5FF20;
  --glow-neon:0 0 10px #39FF1450,0 0 25px #39FF1420;
}
html,body{background:var(--void);color:var(--t1);font-family:var(--body);min-height:100vh;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);
  background-size:48px 48px}
@keyframes rotate-slow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rotate-ccw{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
@keyframes holo{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.holo{background:linear-gradient(90deg,var(--cyan),#fff,var(--cyan2),var(--cyan));
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:holo 4s linear infinite}
.hex-ring{position:relative;display:flex;align-items:center;justify-content:center}
.hex-ring .r1,.hex-ring .r2{position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
.hex-ring .r1{border-top-color:var(--cyan);border-right-color:var(--cyan);animation:rotate-slow 3s linear infinite;opacity:.7}
.hex-ring .r2{inset:6px;border-bottom-color:var(--cyan);border-left-color:var(--cyan);animation:rotate-ccw 2s linear infinite;opacity:.4}
.hex-ring .ri{position:relative;z-index:1}
.card{position:relative;z-index:1;width:100%;max-width:340px;padding:32px 28px;
  background:rgba(10,32,53,.8);backdrop-filter:blur(20px);
  border:1px solid rgba(0,229,255,.18);border-radius:14px;
  animation:slide-up .5s ease;display:flex;flex-direction:column;gap:20px}
.card::before,.card::after{content:'';position:absolute;width:14px;height:14px;z-index:2}
.card::before{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.card::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em}
.field input{background:rgba(7,24,40,.9);border:1px solid rgba(0,229,255,.2);border-radius:6px;
  color:var(--t1);padding:12px 14px;font-family:var(--mono);font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;width:100%}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.field input.err{border-color:var(--red) !important;box-shadow:0 0 0 3px rgba(255,23,68,.1) !important}
.btn-login{width:100%;padding:15px;background:var(--cyan);color:var(--void);border:none;
  border-radius:8px;font-family:var(--head);font-size:13px;font-weight:700;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;box-shadow:var(--glow-cyan);
  clip-path:polygon(9px 0%,calc(100% - 9px) 0%,100% 9px,100% calc(100% - 9px),calc(100% - 9px) 100%,9px 100%,0% calc(100% - 9px),0% 9px)}
.btn-login:hover{background:#fff;transform:translateY(-2px)}
.btn-login:disabled{background:var(--dim);box-shadow:none;cursor:default;transform:none;opacity:.6}
#error-msg{display:none;padding:10px 13px;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);
  border-radius:6px;font-family:var(--mono);font-size:10px;color:var(--red);text-align:center;line-height:1.5}
.spinner{display:none;width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,229,255,.2);
  border-top-color:var(--cyan);animation:spin .8s linear infinite;margin:0 auto}
.role-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em}
.role-oficial{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}
.role-admin{background:rgba(224,64,251,.1);color:var(--violet);border:1px solid rgba(224,64,251,.3)}
.role-supervisor{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.3)}
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- Ambient glow -->
<div style="position:fixed;top:30%;left:20%;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,255,.06) 0%,transparent 70%);pointer-events:none"></div>
<div style="position:fixed;bottom:25%;right:15%;width:250px;height:250px;border-radius:50%;
  background:radial-gradient(circle,rgba(224,64,251,.05) 0%,transparent 70%);pointer-events:none"></div>

<div class="card">
  <!-- Logo -->
  <div style="text-align:center">
    <div class="hex-ring" style="width:80px;height:80px;margin:0 auto 16px">
      <div class="r1"></div><div class="r2"></div>
      <div class="ri" style="font-size:30px;animation:float 4s ease-in-out infinite">✈</div>
    </div>
    <div class="holo" style="font-family:var(--head);font-size:34px;font-weight:900;letter-spacing:.12em;line-height:1">AVSEC PRO</div>
    <div style="font-family:var(--head);font-size:10px;color:var(--cyan2);letter-spacing:.22em;margin-top:6px">SEGURIDAD AERONÁUTICA · SJO</div>
  </div>

  <!-- Form -->
  <div style="display:flex;flex-direction:column;gap:14px">
    <div class="field">
      <label>USUARIO</label>
      <input id="inp-user" type="text" placeholder="usuario@sjo" autocomplete="username" autocapitalize="none"
        onkeydown="if(event.key==='Enter')$('inp-pass').focus()"/>
    </div>
    <div class="field">
      <label>CONTRASEÑA</label>
      <div style="position:relative">
        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding-right:44px"/>
        <button onclick="togglePass()" id="eye-btn"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:4px">👁</button>
      </div>
    </div>
  </div>

  <div id="error-msg"></div>
  <div class="spinner" id="spinner"></div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">⬡ INGRESAR</button>

  <div style="font-family:var(--mono);font-size:8px;color:var(--dim);text-align:center;letter-spacing:.06em">
    AEROPUERTO INTERNACIONAL JUAN SANTAMARÍA · MROC<br>Sistema de Gestión de Seguridad Aeroportuaria
  </div>
</div>

<script>
const SCRIPT_URL = localStorage.getItem("avsec_apps_script") || "";

function $(id){ return document.getElementById(id); }

function togglePass(){
  const inp = $("inp-pass");
  inp.type = inp.type==="password" ? "text" : "password";
}

function showError(msg){
  const e=$("error-msg"); e.textContent=msg; e.style.display="block";
  $("inp-user").classList.add("err"); $("inp-pass").classList.add("err");
}
function clearError(){
  const e=$("error-msg"); e.style.display="none";
  $("inp-user").classList.remove("err"); $("inp-pass").classList.remove("err");
}

async function doLogin(){
  clearError();
  const user = ($("inp-user").value||"").trim();
  const pass = ($("inp-pass").value||"").trim();
  if(!user||!pass){ showError("Ingrese usuario y contraseña"); return; }

  const btn = $("login-btn"); const sp = $("spinner");
  btn.disabled=true; btn.textContent="VERIFICANDO...";
  sp.style.display="block";

  if(!SCRIPT_URL){
    // Fallback demo credentials
    if(user==="admin" && pass==="admin123"){
      onLoginSuccess({username:user,role:"admin",nombre:"Administrador"});
    } else if(user==="oficial" && pass==="oficial123"){
      onLoginSuccess({username:user,role:"oficial",nombre:"Oficial Demo"});
    } else {
      showError("Credenciales incorrectas.\n(Configure Apps Script URL en AVSEC PRO → ⚙)");
    }
    btn.disabled=false; btn.textContent="⬡ INGRESAR"; sp.style.display="none";
    return;
  }

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
    const data = await res.json();
    if(data.ok && data.user){
      onLoginSuccess(data.user);
    } else {
      showError(data.error || "Usuario o contraseña incorrectos");
    }
  } catch(e){
    showError("Error de conexión. Verifique la URL del Apps Script.");
  } finally {
    btn.disabled=false; btn.textContent="⬡ INGRESAR"; sp.style.display="none";
  }
}

function onLoginSuccess(user){
  // Save session
  localStorage.setItem("avsec_user", JSON.stringify(user));
  localStorage.setItem("avsec_login_time", new Date().toISOString());

  // Visual feedback before redirect
  const btn=$("login-btn");
  btn.style.background="var(--neon)"; btn.style.color="#001a00";
  btn.textContent="✓ ACCESO CONCEDIDO";

  setTimeout(()=>{
    // Redirect based on role
    if(user.role==="admin" || user.role==="supervisor"){
      window.location.href = "AVSEC_Dashboard.html";
    } else {
      window.location.href = "AVSEC_PRO_OCR_fixed.html";
    }
  }, 900);
}

// Auto-focus
window.onload = () => {
  // If already logged in, redirect
  const saved = localStorage.getItem("avsec_user");
  if(saved){
    try {
      const u = JSON.parse(saved);
      if(u && u.username) {
        const loginTime = new Date(localStorage.getItem("avsec_login_time")||0);
        const hours = (new Date() - loginTime) / 3600000;
        if(hours < 12) { onLoginSuccess(u); return; }
      }
    } catch(e){}
  }
  $("inp-user").focus();
};
</script>
</body>
</html>
